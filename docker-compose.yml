services:
  postgres:
    image: postgres:16-alpine
    container_name: bingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: bingo
      POSTGRES_DB: bingo
    ports:
      - '5432:5432'
    volumes:
      - bingo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bingo -d bingo']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bingo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # The Next.js app (Mini App UI + API + Telegram bot, all in one). Comment this out to
  # run only the databases in Docker and the app on your host (npm run dev).
  app:
    build: .
    container_name: bingo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://bingo:bingo@postgres:5432/bingo?schema=public
      REDIS_URL: redis://redis:6379
      # Public HTTPS URL where this app is reachable (your domain / tunnel).
      WEBAPP_URL: ${WEBAPP_URL}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  bingo-pgdata:
